version: '3.8'

networks:
  medya_network:
    driver: bridge

volumes:
  n8n_data:
  pg_data:
  ollama_data:
  redis_data:
  media_storage:

services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: medya-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    networks:
      - medya_network
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_SECURE_COOKIE=false
      - GENERIC_TIMEZONE=Europe/Istanbul
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=medya-postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=medya_db
      - DB_POSTGRESDB_USER=medya_user
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - N8N_ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - N8N_BLOCK_ENV_ACCESS_IN_NODE=false
      - N8N_PASSWORD_MIN_LENGTH=12
      - EXECUTIONS_DATA_PRUNE=true
      - EXECUTIONS_DATA_MAX_AGE=168
      - EXECUTIONS_DATA_SAVE_ON_ERROR=all
      - EXECUTIONS_DATA_SAVE_ON_SUCCESS=none
      - EXECUTIONS_TIMEOUT=3600
      - NODE_FUNCTION_ALLOW_EXTERNAL=axios,cheerio,xml2js,moment,lodash
      - NODE_FUNCTION_ALLOW_BUILTIN=crypto,fs,path,http,https
      - WEBHOOK_URL=http://localhost:5678
      - N8N_DIAGNOSTICS_ENABLED=false
    volumes:
      - n8n_data:/home/node/.n8n
      - media_storage:/data/media
      - ./workflows:/data/workflows
      - ./init-db:/data/init-db
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres:
    image: postgres:16-alpine
    container_name: medya-postgres
    restart: unless-stopped
    networks:
      - medya_network
    environment:
      - POSTGRES_USER=medya_user
      - POSTGRES_DB=medya_db
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --locale=C
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medya_user -d medya_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: >
      postgres
      -c max_connections=200
      -c shared_buffers=256MB
      -c effective_cache_size=768MB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.7
      -c wal_buffers=16MB
      -c default_statistics_target=100

  ollama:
    image: ollama/ollama:latest
    container_name: medya-ollama
    restart: unless-stopped
    networks:
      - medya_network
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    environment:
      - OLLAMA_HOST=0.0.0.0
      - OLLAMA_ORIGINS=*
      - OLLAMA_KEEP_ALIVE=24h
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
